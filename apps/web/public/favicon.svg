<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5e72e4"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- 圆角方块底 -->
  <rect width="64" height="64" rx="14" fill="url(#grad)"/>
  <!-- "P" + 电流符号 暗示 Photonics + Electronics -->
  <text x="32" y="42" text-anchor="middle" font-family="ui-monospace, monospace"
        font-size="32" font-weight="800" fill="white">P</text>
  <!-- 电路点缀 -->
  <circle cx="52" cy="12" r="2.5" fill="#22d3ee"/>
  <circle cx="12" cy="52" r="2.5" fill="#22d3ee"/>
</svg>
