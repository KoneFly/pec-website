# =============================================
# 前端自动部署到 GitHub Pages
# 触发：main 分支变更 apps/web/** 或 packages/shared/**
# =============================================
name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只允许一个部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # 不指定 version，让它读 package.json 的 packageManager 字段（pnpm@9.15.0）

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install web deps only (skip api's native modules)
        run: pnpm install --frozen-lockfile --filter "@pec/web..."

      - name: Build web
        run: pnpm --filter @pec/web build
        env:
          PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
